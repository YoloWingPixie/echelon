version: "3"

tasks:
  default:
    desc: List available tasks.
    cmds:
      - task -l
    silent: true

  install:
    desc: Install npm dependencies.
    cmds:
      - npm install

  dev:
    desc: Start the Vite dev server.
    cmds:
      - npm run dev

  build:
    desc: Type-check and build the production bundle.
    cmds:
      - npm run build

  preview:
    desc: Serve the production build locally.
    cmds:
      - npm run preview

  typecheck:
    desc: Run TypeScript in --noEmit mode.
    cmds:
      - npx tsc --noEmit

  lint:
    desc: Run ESLint (config scaffolded by Vite).
    cmds:
      - npm run lint

  clean:
    desc: Remove node_modules and dist.
    cmds:
      - rm -rf node_modules dist

  docker:
    desc: Rebuild and restart the app in Docker (port 30093).
    cmds:
      - docker compose down
      - docker compose build
      - docker compose up -d

  docker:build:
    desc: Build the Docker image.
    cmds:
      - docker compose build

  docker:up:
    desc: Start the app in Docker (port 30093).
    cmds:
      - docker compose up -d

  docker:down:
    desc: Stop the Docker container.
    cmds:
      - docker compose down

  docker:run:
    desc: Alias for 'task docker'.
    cmds:
      - task: docker

  docker:logs:
    desc: Tail container logs.
    cmds:
      - docker compose logs -f
